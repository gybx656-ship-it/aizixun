name: Daily AI Brief to Feishu

on:
  schedule:
    # 09:00 Asia/Shanghai = 01:00 UTC.
    - cron: "0 1 * * *"
  workflow_dispatch:

jobs:
  send:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate and send brief
        run: npm run brief
        env:
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
          FEISHU_SIGN_SECRET: ${{ secrets.FEISHU_SIGN_SECRET }}
